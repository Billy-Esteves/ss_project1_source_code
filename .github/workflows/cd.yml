name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  cd:
    name: Build, Scan & Push Images (GHCR)
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build web image
        run: docker build -t ghcr.io/${{ github.repository }}/app-web:latest ./web

      - name: Build db image
        run: docker build -t ghcr.io/${{ github.repository }}/app-db:latest ./db

      # CONTAINER SCANNING (Trivy)
      - name: Scan web image (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/app-web:latest

      - name: Scan db image (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/app-db:latest

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository.lowercase() }}/app-web:latest
          docker push ghcr.io/${{ github.repository.lowercase() }}/app-db:latest